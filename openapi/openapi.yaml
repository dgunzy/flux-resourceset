        description: The request body for /namespaces/{id}
        required: true
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateNamespace'
          description: Response for OK
      security:
      - bearer_auth: []
      tags:
      - namespaces
  /platform_components:
