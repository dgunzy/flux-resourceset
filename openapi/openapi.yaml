      - &id005
        description: Number of records to skip.
        in: query
        name: offset
        schema:
          type: integer
      responses:
        200:
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/namespace'
                type: array
          description: Response for OK
      tags:
      - namespaces
    post:
      description: Create a namespace.
      operationId: namespaces_post
      parameters:
      - *id004
      - *id005
      requestBody:
        content:
          application/json:
            schema: &id006
              $ref: '#/components/schemas/CreateNamespace'
        description: The request body for /namespaces
        required: true
      responses:
        201:
          content:
            application/json:
              schema: *id006
          description: Response for CREATED
      security:
      - bearer_auth: []
      tags:
      - namespaces
  /namespaces/{id}:
    delete:
      description: Delete a namespace by id.
      operationId: namespaces_id_delete
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/namespace'
          description: Response for OK
      security:
      - bearer_auth: []
      tags:
      - namespaces
    get:
      description: Get a namespace by id.
      operationId: namespaces_id_get
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/namespace'
          description: Response for OK
      tags:
      - namespaces
    put:
      description: Replace a namespace by id.
      operationId: namespaces_id_put
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
